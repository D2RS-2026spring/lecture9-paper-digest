<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #f7fafc;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: #1a365d;
  padding: 12pt 30pt;
}
.header h1 {
  color: #ffffff;
  font-size: 24pt;
  margin: 0;
}
.content {
  padding: 15pt 30pt;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.question {
  color: #1a365d;
  font-size: 16pt;
  font-weight: bold;
  margin-bottom: 15pt;
  text-align: center;
}
.question p {
  margin: 0;
}
.data-flow {
  display: flex;
  align-items: flex-start;
  gap: 10pt;
  margin-bottom: 15pt;
}
.data-box {
  background: white;
  border-radius: 6pt;
  padding: 10pt 12pt;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  text-align: center;
  width: 110pt;
}
.data-box .stage {
  color: #1a365d;
  font-size: 11pt;
  font-weight: bold;
  margin-bottom: 4pt;
}
.data-box .stage p {
  margin: 0;
}
.data-box .detail {
  color: #4a5568;
  font-size: 8pt;
  line-height: 1.3;
}
.data-box .detail p {
  margin: 0;
}
.tech-tag {
  background: #ebf8ff;
  color: #2b6cb0;
  padding: 2pt 6pt;
  border-radius: 3pt;
  font-size: 7pt;
  display: inline-block;
  margin-top: 4pt;
}
.tech-tag p {
  margin: 0;
}
.arrow {
  color: #4299e1;
  font-size: 16pt;
  padding-top: 15pt;
}
.arrow p {
  margin: 0;
}
.answer-box {
  background: #1a365d;
  color: white;
  padding: 12pt 25pt;
  border-radius: 6pt;
  text-align: center;
}
.answer-box .yes {
  font-size: 14pt;
  font-weight: bold;
  color: #68d391;
}
.answer-box .yes p {
  margin: 0;
}
.answer-box .explain {
  font-size: 10pt;
  margin-top: 6pt;
  color: #a8d1f0;
}
.answer-box .explain p {
  margin: 0;
}
</style>
</head>
<body>
<div class="header">
  <h1>思考：这依然是数据科学思维吗？</h1>
</div>
<div class="content">
  <div class="question"><p>虽然代码由 AI 辅助生成，但其核心是否遵循数据科学逻辑？</p></div>

  <div class="data-flow">
    <div class="data-box">
      <div class="stage"><p>原始数据</p></div>
      <div class="detail">
        <p>文献信息及原文</p>
        <p>从 Zotero 文献库中获取</p>
      </div>
    </div>

    <div class="arrow"><p>→</p></div>

    <div class="data-box">
      <div class="stage"><p>数据预处理</p></div>
      <div class="detail">
        <p>内容提取</p>
        <p>上传千问模型返回 JSON</p>
      </div>
    </div>

    <div class="arrow"><p>→</p></div>

    <div class="data-box">
      <div class="stage"><p>数据保存</p></div>
      <div class="detail">
        <p>状态缓存</p>
        <span class="tech-tag"><p>SQLite 数据库</p></span>
        <span class="tech-tag"><p>.cache 文件夹</p></span>
      </div>
    </div>

    <div class="arrow"><p>→</p></div>

    <div class="data-box">
      <div class="stage"><p>数据报告</p></div>
      <div class="detail">
        <p>结果呈现</p>
        <span class="tech-tag"><p>单 HTML 页面</p></span>
        <span class="tech-tag"><p>JSON 数据源</p></span>
      </div>
    </div>
  </div>

  <div class="answer-box">
    <div class="yes"><p>✓ 完全遵循数据科学逻辑</p></div>
    <div class="explain"><p>从原始数据获取 → 预处理 → 保存 → 报告的完整数据科学流程</p></div>
  </div>
</div>
</body>
</html>
