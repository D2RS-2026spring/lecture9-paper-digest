<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #1a365d;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.thank-you {
  color: #ffffff;
  font-size: 48pt;
  font-weight: bold;
  margin-bottom: 20pt;
  text-align: center;
}
.thank-you p {
  margin: 0;
}
.subtitle {
  color: #a8d1f0;
  font-size: 20pt;
  margin-bottom: 30pt;
  text-align: center;
}
.subtitle p {
  margin: 0;
}
.divider {
  width: 100pt;
  height: 3pt;
  background: #4299e1;
  margin: 20pt 0;
}
.info {
  color: #cbd5e0;
  font-size: 14pt;
  text-align: center;
  margin-top: 20pt;
}
.info p {
  margin: 0;
}
.quote {
  color: #a8d1f0;
  font-size: 13pt;
  font-style: italic;
  text-align: center;
  max-width: 500pt;
  margin-top: 25pt;
  line-height: 1.6;
}
.quote p {
  margin: 0;
}
</style>
</head>
<body>
<div class="thank-you"><p>感谢聆听</p></div>
<div class="divider"></div>
<div class="subtitle"><p>祝各位顺利完成课程项目</p></div>
<div class="quote"><p>"拥抱 Vibe Coding，掌握 AI 时代的科研开发新范式"</p></div>
<div class="info"><p>2026年04月01日 | 高老师</p></div>
</body>
</html>
